<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport"
        content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>본질센스 리듬 액션 (DJMAX 스타일)</title>
  <link href="https://api.fontshare.com/v2/css?f[]=satoshi@400,700&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #0a0a0f;
      font-family: 'Satoshi', sans-serif;
      touch-action: none;
    }
    body {
      display: flex;
      justify-content: center;
      align-items: center;
      flex-direction: column;
    }
    #wrap {
      position: relative;
      width: min(600px, 100vw);
      height: min(600px, 100vw);
      background: #000;
      box-shadow: 0 0 50px rgba(0,255,153,0.15);
      flex-shrink: 0;
      overflow: hidden;
    }
    canvas {
      display: block;
      width: 100%;
      height: 100%;
      image-rendering: pixelated;
    }

    #ui {
      position: absolute;
      inset: 0;
      pointer-events: none;
      z-index: 3;
    }
    #revenue {
      position: absolute;
      top: 14px;
      left: 14px;
      font-size: clamp(18px, 4vw, 26px);
      font-weight: 700;
      color: #00ff99;
      text-shadow: 0 0 12px rgba(0,255,153,0.45);
      font-variant-numeric: tabular-nums;
    }
    #dialog-box {
      position: absolute;
      left: 14px;
      right: 14px;
      bottom: 14px;
      padding: 12px 14px;
      background: rgba(10,15,25,0.93);
      border: 2px solid #00ff99;
      border-radius: 8px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.7);
    }
    #dialog-speaker {
      font-size: 12px;
      font-weight: 700;
      color: #00ff99;
      margin-bottom: 4px;
      text-transform: uppercase;
    }
    #dialog-text {
      font-size: 13px;
      line-height: 1.5;
      color: #f8fafc;
    }

    #start-screen {
      position: absolute;
      inset: 0;
      z-index: 10;
      background: rgba(5,10,15,0.97);
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      gap: 16px;
      pointer-events: auto;
    }
    #start-screen h1 {
      font-size: clamp(22px, 5vw, 30px);
      color: #00ff99;
      text-align: center;
      line-height: 1.3;
    }
    #start-screen p {
      color: #64748b;
      font-size: 13px;
      line-height: 1.7;
      text-align: center;
      max-width: 440px;
      padding: 0 16px;
    }
    #start-btn {
      border: none;
      border-radius: 8px;
      background: #00ff99;
      color: #07110d;
      padding: 13px 34px;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      pointer-events: auto;
    }

    /* 모바일용 터치 컨트롤을 리듬 입력용 버튼으로 재활용 */
    #touch-controls {
      width: min(600px, 100vw);
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 14px;
      padding: 10px 18px 14px;
      background: #0a0a0f;
      flex-shrink: 0;
    }
    .lane-btn {
      flex: 1;
      max-width: 110px;
      height: 70px;
      border-radius: 12px;
      border: 2px solid rgba(0,255,153,0.35);
      background: rgba(0,255,153,0.08);
      color: #e5e7eb;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 2px;
      font-size: 13px;
      font-weight: 700;
      user-select: none;
      -webkit-user-select: none;
    }
    .lane-btn span.key {
      font-size: 18px;
      color: #00ff99;
    }
    .lane-btn:active {
      background: rgba(0,255,153,0.3);
    }

    @media (max-width: 600px) {
      #dialog-box { bottom: 10px; left: 10px; right: 10px; }
      #dialog-text { font-size: 12px; }
      #touch-controls { padding: 8px 12px 12px; }
    }
  </style>
</head>
<body>
  <div id="wrap">
    <canvas id="c" width="600" height="600"></canvas>

    <div id="ui">
      <div id="revenue">SCORE: 0 (0x)</div>
      <div id="dialog-box">
        <div id="dialog-speaker">시스템 알림</div>
        <div id="dialog-text">
          D / F / J / K 키 또는 아래 버튼을 박자에 맞춰 눌러보세요.
        </div>
      </div>
    </div>

    <div id="start-screen">
      <h1>본질센스 리듬 액션<br>DJMAX 스타일 4키</h1>
      <p>
        기술 → 본질(만체리) → 사업화·고수익화 → 코어를<br>
        리듬에 맞춰 입력하며 체득하는 4키 리듬 액션 모드입니다.<br>
        D / F / J / K 키로 플레이합니다.
      </p>
      <button id="start-btn">▶ 시스템 가동</button>
    </div>
  </div>

  <div id="touch-controls">
    <div class="lane-btn" data-lane="0">
      <span class="key">D</span>
      <span>기술</span>
    </div>
    <div class="lane-btn" data-lane="1">
      <span class="key">F</span>
      <span>만체리</span>
    </div>
    <div class="lane-btn" data-lane="2">
      <span class="key">J</span>
      <span>사업화</span>
    </div>
    <div class="lane-btn" data-lane="3">
      <span class="key">K</span>
      <span>코어</span>
    </div>
  </div>

  <script>
    const W = 600, H = 600;

    const canvas = document.getElementById('c');
    const ctx = canvas.getContext('2d');
    ctx.imageSmoothingEnabled = false;

    // 리듬게임 상태
    const state = {
      phase: 'start',
      score: 0,
      combo: 0,
      maxCombo: 0,
      judgeText: '',
      judgeTimer: 0,
      accuracySamples: [],
      time: 0,
      songLength: 35,     // 대략 35초짜리 곡 가정
      bpm: 130,
      laneX: [90, 210, 330, 450],
      laneWidth: 80,
      judgeY: 500,
      noteSpeed: 280,     // 판정선까지 내려오는 속도(px/s)
      appearTime: 2.0,    // 판정선 도달 2초 전에 위에서 등장
      notes: [],
      keys: {},
    };

    // 간단한 패턴 (타이밍 / 레인)
    // 실제로는 BPM 기반으로 막 늘리면 됨
    const chart = [];
    (function makeChart() {
      // 4마디 정도 반복 패턴
      const beat = 60 / state.bpm; // 한 박자 길이
      let t = 2;                   // 2초 후부터 시작
      const pattern = [
        0,1,2,3,
        0,1,2,3,
        0,2,1,3,
        0,3,1,2
      ];
      // 16비트 간격으로 4마디 정도 생성
      for (let m = 0; m < 8; m++) {
        for (let i = 0; i < pattern.length; i++) {
          chart.push({ time: t, lane: pattern[i] });
          t += beat / 2; // 8비트
        }
        t += beat; // 중간에 쉬는 간격
      }
    })();

    function setDialog(speaker, txt) {
      const sp = document.getElementById('dialog-speaker');
      sp.textContent = speaker;
      sp.style.color =
        speaker.includes('기술') ? '#38bdf8' :
        speaker.includes('만체리') ? '#a855f7' :
        speaker.includes('사업화') ? '#f97316' :
        speaker.includes('코어') ? '#22c55e' :
        '#00ff99';
      document.getElementById('dialog-text').textContent = txt;
    }

    function updateScoreUI() {
      const acc =
        state.accuracySamples.length
          ? (state.accuracySamples.reduce((a,b)=>a+b,0) / state.accuracySamples.length)
          : 100;
      document.getElementById('revenue').textContent =
        `SCORE: ${Math.floor(state.score).toLocaleString()} (${state.combo}x, ${acc.toFixed(1)}%)`;
    }

    // 노트가 실제로 내려오기 시작하는 시점에 notes로 옮김
    function spawnNotesIfNeeded() {
      for (const n of chart) {
        if (n.spawned) continue;
        if (state.time >= n.time - state.appearTime) {
          state.notes.push({
            time: n.time,
            lane: n.lane,
            hit: false,
            judged: false
          });
          n.spawned = true;
        }
      }
    }

    function drawBackground() {
      // 간단한 DJMAX 느낌 배경
      const g = ctx.createLinearGradient(0,0,0,H);
      g.addColorStop(0, '#020617');
      g.addColorStop(0.4, '#020617');
      g.addColorStop(1, '#020617');
      ctx.fillStyle = g;
      ctx.fillRect(0,0,W,H);

      // 중앙 라인
      ctx.strokeStyle = '#0f172a';
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.moveTo(W/2, 0);
      ctx.lineTo(W/2, H);
      ctx.stroke();
    }

    function drawLanes() {
      for (let i = 0; i < 4; i++) {
        const x = state.laneX[i];
        ctx.fillStyle = 'rgba(15,23,42,0.9)';
        ctx.fillRect(x - state.laneWidth/2, 60, state.laneWidth, H - 120);

        // 라인 테두리
        ctx.strokeStyle = '#1f2937';
        ctx.lineWidth = 3;
        ctx.strokeRect(x - state.laneWidth/2, 60, state.laneWidth, H - 120);
      }

      // 판정선
      ctx.fillStyle = '#00ff99';
      ctx.fillRect(60, state.judgeY, W-120, 3);
    }

    function drawNotes() {
      const now = state.time;

      for (const n of state.notes) {
        if (n.hit || (now - n.time) > 0.5) continue; // 너무 지난 노트는 안 그려도 됨

        const t = (now - (n.time - state.appearTime)) / state.appearTime;
        const y = 60 + t * (state.judgeY - 60);
        const x = state.laneX[n.lane];

        if (y < 60 || y > H) continue;

        // 노트
        ctx.save();
        ctx.translate(x, y);
        const w = state.laneWidth - 14;
        const h = 18;

        const colors = ['#38bdf8','#a855f7','#f97316','#22c55e'];
        ctx.fillStyle = colors[n.lane];
        ctx.beginPath();
        ctx.roundRect(-w/2, -h/2, w, h, 6);
        ctx.fill();

        // 안쪽 하이라이트
        ctx.globalAlpha = 0.35;
        ctx.fillStyle = '#f9fafb';
        ctx.fillRect(-w/2+3, -h/2+3, w-6, 4);
        ctx.globalAlpha = 1;
        ctx.restore();
      }
    }

    function drawJudgeEffect() {
      if (!state.judgeText) return;
      ctx.save();
      ctx.textAlign = 'center';
      ctx.font = 'bold 32px Satoshi, sans-serif';
      let col = '#e5e7eb';
      if (state.judgeText === 'PERFECT') col = '#22c55e';
      else if (state.judgeText === 'GREAT') col = '#0ea5e9';
      else if (state.judgeText === 'GOOD') col = '#eab308';
      else if (state.judgeText === 'MISS') col = '#ef4444';

      ctx.fillStyle = col;
      ctx.fillText(state.judgeText, W/2, state.judgeY - 70);
      ctx.restore();
    }

    function render() {
      ctx.clearRect(0,0,W,H);
      if (state.phase !== 'play' && state.phase !== 'end') return;

      drawBackground();
      drawLanes();
      drawNotes();
      drawJudgeEffect();
    }

    function addAccuracySample(diff, baseWindow) {
      // diff: 실제 오차(초), baseWindow: GOOD 범위
      const ratio = Math.max(0, 1 - diff / baseWindow);
      const acc = 50 + ratio * 50; // 50~100 사이 값
      state.accuracySamples.push(acc);
    }

    function setJudge(text) {
      state.judgeText = text;
      state.judgeTimer = 0.4;
    }

    function registerHit(note, judge, scoreAdd, diff, goodWindow) {
      note.hit = true;
      note.judged = true;
      state.combo += 1;
      if (state.combo > state.maxCombo) state.maxCombo = state.combo;
      state.score += scoreAdd + state.combo * 1.5;
      addAccuracySample(diff, goodWindow);
      setJudge(judge);
      updateScoreUI();

      // 판정별 안내 문구 (살짝 교육 텍스트 섞기)
      if (judge === 'PERFECT') {
        setDialog('만체리 - 본질',
          '완벽한 타이밍입니다. 지금처럼 “실제 수요가 온 시점”을 잡는 게 핵심입니다.');
      } else if (judge === 'GREAT') {
        setDialog('사업화·고수익화',
          '좋은 타이밍입니다. 구조를 조금 더 다듬으면 더 큰 레버리지를 만들 수 있습니다.');
      } else if (judge === 'GOOD') {
        setDialog('기술',
          '기술은 맞았지만, 타이밍이 약간 어긋났습니다. 본질(만체리) 타이밍까지 의식해 보세요.');
      }
    }

    function registerMiss() {
      state.combo = 0;
      setJudge('MISS');
      state.accuracySamples.push(50);
      updateScoreUI();
      setDialog('코어(Core)',
        '놓친 비트입니다. 내가 좋아하며 꾸준히 들고 갈 수 있는 코어인지 다시 점검해 보세요.');
    }

    function judgeLane(lane) {
      if (state.phase !== 'play') return;

      const now = state.time;
      const hitWindow = {
        perfect: 0.06,
        great: 0.12,
        good: 0.2
      };

      // 아직 판정 안 된, 해당 레인의 노트들 중에서 가장 가까운 것
      const candidates = state.notes
        .filter(n => !n.judged && n.lane === lane)
        .sort((a,b) => Math.abs(a.time - now) - Math.abs(b.time - now));

      if (!candidates.length) {
        registerMiss();
        return;
      }

      const note = candidates[0];
      const diff = Math.abs(note.time - now);

      if (diff <= hitWindow.perfect) {
        registerHit(note, 'PERFECT', 300, diff, hitWindow.good);
      } else if (diff <= hitWindow.great) {
        registerHit(note, 'GREAT', 200, diff, hitWindow.good);
      } else if (diff <= hitWindow.good) {
        registerHit(note, 'GOOD', 100, diff, hitWindow.good);
      } else {
        note.judged = true;
        registerMiss();
      }
    }

    function update(dt) {
      if (state.phase !== 'play') return;

      state.time += dt;
      spawnNotesIfNeeded();

      // MISS 판정 (노트가 판정선 지나고도 안 눌린 경우)
      const missWindow = 0.18;
      for (const n of state.notes) {
        if (n.judged) continue;
        if (state.time - n.time > missWindow) {
          n.judged = true;
          state.combo = 0;
          setJudge('MISS');
          state.accuracySamples.push(50);
          updateScoreUI();
        }
      }

      if (state.judgeTimer > 0) {
        state.judgeTimer -= dt;
        if (state.judgeTimer <= 0) {
          state.judgeText = '';
        }
      }

      if (state.time >= state.songLength && state.phase === 'play') {
        endGame();
      }
    }

    function endGame() {
      state.phase = 'end';
      const acc =
        state.accuracySamples.length
          ? (state.accuracySamples.reduce((a,b)=>a+b,0) / state.accuracySamples.length)
          : 100;

      const el = document.createElement('div');
      el.style.cssText =
        'position:absolute;inset:0;z-index:20;background:rgba(5,10,15,0.97);display:flex;flex-direction:column;justify-content:center;align-items:center;gap:16px;';
      el.innerHTML = `
        <div style="font-size:48px;">⭐</div>
        <h1 style="font-size:24px;font-weight:700;color:#00ff99;text-align:center;">본질센스 리듬 액션 클리어</h1>
        <p style="color:#94a3b8;font-size:13px;line-height:1.8;text-align:center;max-width:440px;padding:0 16px;">
          최종 스코어:
          <strong style="color:#00ff99;font-size:18px;">
            ${Math.floor(state.score).toLocaleString()}
          </strong><br>
          최대 콤보: <strong>${state.maxCombo}</strong> / 평균 정확도:
          <strong>${acc.toFixed(1)}%</strong><br><br>
          기술 위에 본질(만체리: 잠재 트래픽·노출 가능성·가격×수),<br>
          사업화·고수익화(다회성 트래픽·브랜딩·CPA·레버리지)를 쌓고,<br>
          코어까지 정렬한 결과입니다.
        </p>
        <button onclick="location.reload()"
          style="background:#00ff99;color:#07110d;border:none;border-radius:8px;padding:10px 28px;font-size:15px;font-weight:700;cursor:pointer;">
          다시 플레이
        </button>
      `;
      document.getElementById('wrap').appendChild(el);
    }

    // 키 입력 (D/F/J/K)
    const keyLaneMap = {
      'KeyD': 0,
      'KeyF': 1,
      'KeyJ': 2,
      'KeyK': 3
    };

    document.addEventListener('keydown', e => {
      if (e.repeat) return;
      if (keyLaneMap.hasOwnProperty(e.code)) {
        e.preventDefault();
        judgeLane(keyLaneMap[e.code]);
      }
    });

    // 터치 / 마우스로 레인 버튼 누르기
    function bindLaneButton(el) {
      const lane = Number(el.dataset.lane);
      const handler = e => {
        e.preventDefault();
        judgeLane(lane);
      };
      el.addEventListener('touchstart', handler, { passive: false });
      el.addEventListener('mousedown', handler);
    }
    document.querySelectorAll('.lane-btn').forEach(bindLaneButton);

    let lastTime = 0;
    function loop(now) {
      const dt = Math.min((now - lastTime) / 1000, 0.05);
      lastTime = now;
      update(dt);
      render();
      requestAnimationFrame(loop);
    }

    document.getElementById('start-btn').addEventListener('click', () => {
      document.getElementById('start-screen').style.display = 'none';
      state.phase = 'play';
      setDialog('박사님',
        'D / F / J / K 네 키가 각각 기술, 만체리, 사업화·고수익화, 코어다. 비트에 맞춰 입력하며 구조를 몸으로 익혀보게.');
      updateScoreUI();
      lastTime = performance.now();
      requestAnimationFrame(loop);
    });
  </script>
</body>
</html>
