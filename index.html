<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>블로거 메이커 : 1000만원의 길</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=DungGeunMo&display=swap');
        body { background: #222; color: #fff; font-family: 'DungGeunMo', sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        #game-box { width: 700px; background: #3d2e2e; border: 8px double #c0a080; padding: 20px; box-shadow: 0 0 20px rgba(0,0,0,0.5); }
        
        .header { display: flex; justify-content: space-between; border-bottom: 2px solid #c0a080; padding-bottom: 10px; margin-bottom: 15px; color: #ffd700; }
        
        .main-screen { display: flex; gap: 20px; height: 350px; }
        
        /* ⬇️ [수정된 부분] 생성된 이미지를 메인 화면 배경으로 적용 ⬇️ */
        .visual-area { 
            flex: 1; 
            background-color: #1a1a1a; 
            background-image: url('https://image.civitai.com/xG1nkqKTMz6b78440/animations/7257c7cb-77b3-461d-a94f-402a5e55b40c.gif'); /* 생성된 블로그 폭발 도트 이미지 URL */
            background-size: cover; 
            background-position: center;
            border: 4px solid #5d4037; 
            position: relative; 
            overflow: hidden; 
            display: flex; flex-direction: column; align-items: center; justify-content: flex-end; 
        }
        /* ⬆️ [수정 끝] ⬆️ */

        .char-sprite { font-size: 80px; z-index: 2; margin-bottom: 20px; transition: 0.3s; text-shadow: 2px 2px 0 #000; }
        
        .status-area { width: 220px; background: #5d4037; padding: 15px; border-radius: 5px; font-size: 14px; line-height: 1.8; }
        .stat-bar { background: #333; height: 10px; border-radius: 5px; margin-top: 4px; overflow: hidden; }
        .bar-fill { background: #ff4757; height: 100%; transition: 0.5s; }

        .log-area { height: 100px; background: #000; border: 2px solid #c0a080; margin: 15px 0; padding: 10px; font-size: 13px; color: #2ecc71; overflow-y: auto; text-align: left; }
        
        .controls { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        button { background: #8b4513; color: #fff; border: 2px solid #c0a080; padding: 12px; cursor: pointer; font-family: inherit; font-size: 15px; }
        button:hover { background: #a0522d; }
        button:disabled { background: #555; cursor: not-allowed; }

        .modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); display: none; justify-content: center; align-items: center; z-index: 100; }
        .modal-content { background: #3d2e2e; padding: 30px; border: 6px double #ffd700; text-align: center; }
    </style>
</head>
<body>
    </body>
</html>
