<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>애드센스 마스터: 본질의 추구</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=DungGeunMo&display=swap');
        body { background: #000; color: #fff; font-family: 'DungGeunMo', sans-serif; margin: 0; }
        #ui { position: fixed; top: 0; width: 100%; background: rgba(0,0,0,0.8); padding: 15px; border-bottom: 2px solid #2ecc71; display: flex; justify-content: space-around; z-index: 100; }
        #game-map { width: 100vw; height: 100vh; background: #1a1a1a; position: relative; overflow: hidden; }
        
        /* 캐릭터 (마케터) */
        #player { width: 40px; height: 40px; background: #f1c40f; position: absolute; border: 2px solid #fff; transition: 0.1s; }
        
        /* 키워드 몬스터 */
        .keyword { position: absolute; padding: 5px 10px; border-radius: 4px; cursor: pointer; font-size: 12px; }
        .is-real { border: 2px solid #ffd700; color: #ffd700; } /* 될 만한 놈 */
        .is-fake { border: 2px solid #555; color: #555; } /* 안 될 놈 */
    </style>
</head>
<body>

<div id="ui">
    <div>💰 수익: $<span id="money">0</span></div>
    <div>🧠 분석력: Lv.<span id="level">1</span></div>
    <div>🔥 트래픽: <span id="traffic">0</span></div>
</div>

<div id="game-map">
    <div id="player" style="left: 50%; top: 50%;"></div>
</div>

<script>
    let stats = { money: 0, level: 1, traffic: 0, hp: 100 };
    const map = document.getElementById('game-map');
    const player = document.getElementById('player');

    // 키워드 생성 (영상 4: '될 만한 놈' 찾기 로직)
    function spawnKeyword() {
        const kw = document.createElement('div');
        const isReal = Math.random() > 0.6; // 40% 확률로 진짜 수익 키워드
        kw.className = `keyword ${isReal ? 'is-real' : 'is-fake'}`;
        kw.innerText = isReal ? "💎 될 만한 놈" : "❌ 안 될 놈";
        kw.style.left = Math.random() * 90 + 'vw';
        kw.style.top = Math.random() * 80 + 10 + 'vh';
        
        kw.onclick = () => {
            if(isReal) {
                stats.traffic += 100;
                stats.money += (stats.traffic * 0.5); // 본질 공식: 트래픽 x 단가
                stats.level += 1;
                alert("본질 파악 성공! 외부 유입과 광고 배치가 적중했습니다.");
            } else {
                alert("안 되는 것에 에너지를 썼습니다. 수익 0원.");
            }
            kw.remove();
            updateUI();
            spawnKeyword();
        };
        map.appendChild(kw);
    }

    function updateUI() {
        document.getElementById('money').innerText = Math.floor(stats.money);
        document.getElementById('level').innerText = stats.level;
        document.getElementById('traffic').innerText = stats.traffic;
    }

    // 캐릭터 이동
    window.addEventListener('keydown', (e) => {
        let l = parseInt(player.style.left);
        let t = parseInt(player.style.top);
        if(e.key === 'ArrowUp') player.style.top = (t-5) + '%';
        if(e.key === 'ArrowDown') player.style.top = (t+5) + '%';
        if(e.key === 'ArrowLeft') player.style.left = (l-5) + '%';
        if(e.key === 'ArrowRight') player.style.left = (l+5) + '%';
    });

    for(let i=0; i<5; i++) spawnKeyword();
</script>
</body>
</html>
