<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>애드센스 던전: 도트 메이커</title>
    <style>
        /* 도트 감성을 위한 폰트 및 스타일 */
        body { background: #2c3e50; color: #fff; font-family: 'Courier New', Courier, monospace; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        #game-window { background: #000; width: 600px; border: 6px solid #ecf0f1; border-radius: 8px; position: relative; overflow: hidden; }
        
        /* 배경 설정 (OpenGameArt의 도트 배경 이미지 활용) */
        #stage { 
            height: 300px; 
            background-image: url('https://raw.githubusercontent.com/KenneyNL/Adobe-Animate-Extension/master/Example%20Assets/Backgrounds/background_0.png');
            background-size: cover;
            display: flex; justify-content: center; align-items: flex-end; padding-bottom: 20px;
        }

        /* 도트 캐릭터 (Kenney의 픽셀 캐릭터) */
        #character { 
            width: 96px; height: 96px; 
            background-image: url('https://kenney.nl/content/assets/pixel-platformer/Preview.png'); /* 임시 스프라이트 시트 */
            background-size: 800px;
            background-position: -20px -20px; /* 특정 캐릭터 위치 추출 */
            image-rendering: pixelated;
        }

        .stat-panel { display: grid; grid-template-columns: 1fr 1fr; background: #34495e; padding: 10px; border-top: 4px solid #ecf0f1; }
        .log-panel { height: 100px; background: #000; padding: 10px; overflow-y: auto; font-size: 13px; color: #2ecc71; border-top: 2px solid #7f8c8d; text-align: left; }
        
        .action-panel { display: flex; flex-wrap: wrap; justify-content: center; background: #2c3e50; padding: 10px; }
        button { 
            background: #e67e22; border: none; border-bottom: 4px solid #d35400; color: white; 
            padding: 10px 15px; margin: 5px; cursor: pointer; font-family: inherit; font-weight: bold;
        }
        button:active { border-bottom: none; transform: translateY(4px); }
        button:disabled { background: #7f8c8d; border-bottom: 4px solid #2c3e50; }
    </style>
</head>
<body>

<div id="game-window">
    <div id="stage">
        <div id="character" title="블로거 하종수"></div>
    </div>

    <div class="stat-panel">
        <div>💰 수익: $<span id="money">0</span></div>
        <div>💪 체력: <span id="hp">100</span></div>
        <div>🧠 분석: <span id="analysis">0</span></div>
        <div>✨ 자신감: <span id="conf">0</span></div>
    </div>

    <div class="log-panel" id="log">
        [시스템] "큰 키워드만 고집할 필요는 없습니다."<br>틈새 키워드로 전설의 블로거가 되세요!
    </div>

    <div class="action-panel">
        <button onclick="play('study')">VOD 공부</button>
        <button onclick="play('niche')">틈새 키워드</button>
        <button onclick="play('main')">메인 키워드</button>
        <button onclick="play('rest')">빵집 휴식</button>
    </div>
</div>

<script>
    let stats = { money: 0, hp: 100, analysis: 0, conf: 0 };

    function log(msg) {
        const logBox = document.getElementById('log');
        logBox.innerHTML += `<div>> ${msg}</div>`;
        logBox.scrollTop = logBox.scrollHeight;
    }

    function update() {
        document.getElementById('money').innerText = stats.money;
        document.getElementById('hp').innerText = stats.hp;
        document.getElementById('analysis').innerText = stats.analysis;
        document.getElementById('conf').innerText = stats.conf;
        
        // 체력에 따른 캐릭터 상태 표현 (도트 위치 변경)
        const char = document.getElementById('character');
        if (stats.hp < 30) char.style.filter = "grayscale(100%)";
        else char.style.filter = "none";
    }

    function play(type) {
        if (stats.hp <= 0 && type !== 'rest') {
            log("너무 지쳤습니다. 휴식이 필요합니다!");
            return;
        }

        switch(type) {
            case 'study':
                stats.analysis += 12;
                stats.hp -= 10;
                log("본질센스 강의 시청! '잠재 트래픽'의 개념을 깨달았습니다.");
                break;
            case 'niche':
                let reward = 15 + Math.floor(stats.analysis / 3);
                stats.money += reward;
                stats.conf += 5;
                stats.hp -= 15;
                log(`틈새 키워드 '${['전쟁 지원금', '이재명 지원금', '실버 정보'][Math.floor(Math.random()*3)]}' 포스팅! $${reward} 획득.`);
                break;
            case 'main':
                if (stats.analysis < 60) {
                    log("메인 키워드 경쟁에서 밀렸습니다. 체력만 낭비했습니다...");
                    stats.hp -= 35;
                } else {
                    stats.money += 150;
                    log("전략적 분석 성공! 메인 키워드가 상단에 노출되었습니다! (+$150)");
                    stats.hp -= 45;
                }
                break;
            case 'rest':
                stats.hp = Math.min(100, stats.hp + 45);
                stats.conf += 2;
                log("빵집 투어로 에너지를 충전합니다. 역시 빵이 최고야!");
                break;
        }

        if (stats.money >= 1000) {
            log("🎉 축하합니다! 월 1,000만 원 수익 달성! 은퇴 후 빵집을 차립니다.");
            document.querySelectorAll('button').forEach(b => b.disabled = true);
        }
        update();
    }
</script>

</body>
</html>
