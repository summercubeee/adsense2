<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>애드센스 던전: 틈새의 지배자</title>
    <style>
        body { background: #1a1a1a; color: #fff; text-align: center; font-family: sans-serif; }
        canvas { border: 4px solid #444; background: #000; cursor: crosshair; }
        .ui { margin-top: 20px; }
        .info { color: #aaa; font-size: 0.9em; margin-top: 10px; }
    </style>
</head>
<body>
    <h1>애드센스 던전: 틈새의 지배자</h1>
    <div class="ui">
        <span>현재 수익: $<span id="score">0</span></span> | 
        <span>남은 에너지: <span id="energy">100</span>%</span>
    </div>
    <canvas id="gameCanvas" width="800" height="500"></canvas>
    <div class="info">
        * 조작: 마우스 클릭으로 키워드 수집<br>
        * <b>황금색(메인 키워드)</b>: 클릭 시 큰 수익을 주지만 1초 만에 사라집니다.<br>
        * <b>푸른색(틈새 키워드)</b>: 수익은 작지만 화면에 오래 머물며 꾸준히 생성됩니다.
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreEl = document.getElementById('score');
        const energyEl = document.getElementById('energy');

        let score = 0;
        let energy = 100;
        let keywords = [];

        class Keyword {
            constructor(type) {
                this.type = type; // 'main' or 'niche'
                this.x = Math.random() * (canvas.width - 100) + 50;
                this.y = Math.random() * (canvas.height - 100) + 50;
                this.life = type === 'main' ? 60 : 300; // 메인은 1초(60프레임), 틈새는 5초
                this.opacity = 1;
                this.text = type === 'main' ? "💰 메인 키워드" : "💎 틈새 키워드";
                this.color = type === 'main' ? "#FFD700" : "#00BFFF";
                this.value = type === 'main' ? 50 : 10;
            }

            draw() {
                ctx.globalAlpha = this.opacity;
                ctx.fillStyle = this.color;
                ctx.font = "bold 16px sans-serif";
                ctx.fillText(this.text, this.x, this.y);
                ctx.globalAlpha = 1;
            }

            update() {
                this.life--;
                if (this.life < 20) this.opacity -= 0.05;
            }
        }

        function spawn() {
            if (Math.random() < 0.02) keywords.push(new Keyword('main'));
            if (Math.random() < 0.05) keywords.push(new Keyword('niche'));
        }

        canvas.addEventListener('click', (e) => {
            const rect = canvas.getBoundingClientRect();
            const mouseX = e.clientX - rect.left;
            const mouseY = e.clientY - rect.top;

            keywords.forEach((kw, index) => {
                if (mouseX > kw.x - 20 && mouseX < kw.x + 100 &&
                    mouseY > kw.y - 20 && mouseY < kw.y + 10) {
                    score += kw.value;
                    energy -= 2; // 글 하나 쓸 때마다 에너지 소모
                    keywords.splice(index, 1);
                    scoreEl.innerText = score;
                    energyEl.innerText = energy;
                }
            });
        });

        function gameLoop() {
            if (energy <= 0) {
                alert("에너지 고갈! 최종 수익: $" + score + "\n교훈: 작고 가능한 틈새 키워드로 꾸준히 수익을 쌓으세요.");
                location.reload();
                return;
            }

            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            spawn();
            
            keywords.forEach((kw, index) => {
                kw.update();
                kw.draw();
                if (kw.life <= 0) keywords.splice(index, 1);
            });

            requestAnimationFrame(gameLoop);
        }

        gameLoop();
    </script>
</body>
</html>
